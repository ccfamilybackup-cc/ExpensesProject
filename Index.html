<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Expense Tracker</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .modern-card {
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.5);
    }
    input, select, button { font-size: 16px !important; }
    .scroll-hide::-webkit-scrollbar { display: none; }
  </style>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4 font-sans text-slate-900">

  <div class="modern-card p-8 rounded-[2rem] shadow-2xl w-full max-w-sm border border-white">
    <div class="text-center mb-8">
      <h2 class="text-2xl font-bold text-slate-800">Expense Tracker</h2>
      <p class="text-sm text-slate-500">Manage your daily spending</p>
    </div>
    
    <div class="bg-indigo-600 p-6 rounded-[1.5rem] mb-8 shadow-indigo-200 shadow-xl text-center">
      <label class="block text-indigo-200 text-[10px] font-bold uppercase tracking-[0.2em] mb-2">Remaining Budget</label>
      <div id="sisaBudget" class="text-3xl font-black text-white hidden">Loading...</div>
      <button id="toggleBtn" onclick="toggleBudget()" class="mt-2 bg-indigo-500/50 hover:bg-indigo-500 text-white px-5 py-1.5 rounded-full text-[11px] font-semibold transition-all">
        Show Budget
      </button>
    </div>
    
    <form id="expenseForm" class="space-y-5">
      <div>
        <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 ml-1">Description</label>
        <input type="text" id="barang" placeholder="What did you buy?" required class="w-full px-5 py-4 rounded-2xl bg-white border border-slate-100 focus:ring-4 focus:ring-indigo-100 outline-none transition shadow-sm">
      </div>
      <div>
        <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 ml-1">Category</label>
        <select id="kategori" class="w-full px-5 py-4 rounded-2xl bg-white border border-slate-100 focus:ring-4 focus:ring-indigo-100 outline-none appearance-none shadow-sm">
          <option value="Makanan">🍔 Food & Drink</option>
          <option value="Transportasi">🚗 Transport</option>
          <option value="Hiburan">🎮 Entertainment</option>
          <option value="Kebutuhan Rumah">🏠 Home Needs</option>
          <option value="Kesehatan">💊 Health</option>
          <option value="Pendidikan">📚 Education</option>
          <option value="Lainnya">📦 Other</option>
        </select>
      </div>
      <div>
        <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 ml-1">Amount</label>
        <input type="number" id="jumlah" placeholder="0.00" required class="w-full px-5 py-4 rounded-2xl bg-white border border-slate-100 focus:ring-4 focus:ring-indigo-100 outline-none transition shadow-sm">
      </div>
      <button type="submit" id="submitBtn" class="w-full bg-slate-900 hover:bg-slate-800 text-white font-bold py-4 rounded-2xl shadow-lg transition-all active:scale-95 mt-4">
        Save Transaction
      </button>
    </form>

    <!-- My Expenses Section -->
    <div class="mt-10">
      <h3 class="text-sm font-bold text-slate-700 mb-4">My Expenses</h3>
      <div id="expenseList" class="space-y-3 max-h-40 overflow-y-auto scroll-hide">
        <!-- List item akan muncul di sini -->
      </div>
    </div>
  </div>

  <script>
    const URL = "https://script.google.com/macros/s/AKfycbz3nmxuSBf0jNYjJPhHuhX53BIvMeBdWLto5eDnn96OorK0QroPKyjo7yiJk5sT9inr/exec";
    let budgetTotal = 0;
    let totalPengeluaran = 0;

    function toggleBudget() {
      const display = document.getElementById('sisaBudget');
      const btn = document.getElementById('toggleBtn');
      if (display.classList.contains('hidden')) {
        display.classList.remove('hidden');
        btn.innerText = "Hide Budget";
      } else {
        display.classList.add('hidden');
        btn.innerText = "Show Budget";
      }
    }

    window.onload = async () => {
      try {
        const res = await fetch(URL);
        const data = await res.json();
        budgetTotal = parseFloat(data.budget) || 0;
        updateSisa();
      } catch (err) {
        document.getElementById('sisaBudget').innerText = "Load Failed";
      }
    };

    const updateSisa = () => {
      const sisa = budgetTotal - totalPengeluaran;
      document.getElementById('sisaBudget').innerText = new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', maximumFractionDigits: 0 }).format(sisa);
    };

    document.getElementById("expenseForm").addEventListener("submit", async function(e) {
      e.preventDefault();
      const barang = document.getElementById('barang').value;
      const kategori = document.getElementById('kategori').value;
      const jumlah = parseFloat(document.getElementById('jumlah').value);
      
      const payload = { barang, kategori, jumlah };

      try {
        const res = await fetch(URL, { method: "POST", body: new URLSearchParams(payload) });
        if (res.ok) {
          totalPengeluaran += jumlah;
          updateSisa();
          
          // Add to local list
          const list = document.getElementById('expenseList');
          const item = document.createElement('div');
          item.className = "flex justify-between items-center bg-slate-50 p-3 rounded-xl text-xs";
          item.innerHTML = `<span>${barang}</span><span class="font-bold">${new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', maximumFractionDigits: 0 }).format(jumlah)}</span>`;
          list.prepend(item);
          
          alert("Transaction saved successfully!");
          document.getElementById("expenseForm").reset();
        }
      } catch (err) { alert("Failed to save data."); }
    });
  </script>
</body>
</html>
