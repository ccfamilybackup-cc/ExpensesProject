<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>B.W. Expense Tracker</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap');
    body { font-family: 'Inter', sans-serif; background-color: #ffffff; color: #1e293b; }
    .allowance-card { 
      background: linear-gradient(135deg, #4f46e5 0%, #3b82f6 100%);
      position: relative; overflow: hidden;
    }
    .glass { backdrop-filter: blur(10px); background: rgba(255, 255, 255, 0.7); }
    ::-webkit-scrollbar { display: none; }
    .modal-backdrop {
      backdrop-filter: blur(5px);
    }
  </style>
</head>
<body class="min-h-screen p-4 md:p-8 flex flex-col items-center bg-gray-50">

  <!-- Login Modal -->
  <div id="loginModal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4 modal-backdrop">
    <div class="w-full max-w-sm bg-white p-8 rounded-3xl shadow-2xl">
      <h2 class="text-2xl font-bold mb-2 text-slate-900">Welcome Back</h2>
      <p class="text-sm text-slate-500 mb-6">Enter your credentials to access the tracker</p>
      <div id="loginError" class="hidden mb-4 p-3 bg-red-50 border border-red-200 rounded-lg text-red-700 text-sm"></div>
      <input type="password" id="loginUrl" placeholder="Script URL" class="w-full mb-3 px-4 py-3 rounded-xl border border-slate-200 text-sm focus:ring-2 focus:ring-indigo-500 outline-none">
      <input type="password" id="loginPin" placeholder="Secret PIN" class="w-full mb-6 px-4 py-3 rounded-xl border border-slate-200 text-sm focus:ring-2 focus:ring-indigo-500 outline-none">
      <button onclick="handleLogin()" id="loginBtn" class="w-full bg-indigo-600 text-white py-3 rounded-xl font-bold hover:bg-indigo-700 transition">Login</button>
    </div>
  </div>

  <!-- Session Timeout Warning Modal -->
  <div id="timeoutWarningModal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4 modal-backdrop">
    <div class="w-full max-w-sm bg-white p-8 rounded-3xl shadow-2xl">
      <h2 class="text-xl font-bold mb-2 text-amber-900">⏰ Session Expiring Soon</h2>
      <p class="text-sm text-slate-600 mb-6">Your session will expire in <span id="warningCountdown" class="font-bold text-orange-600">2 minutes</span>. Click below to stay logged in.</p>
      <button onclick="extendSession()" class="w-full bg-amber-500 text-white py-3 rounded-xl font-bold hover:bg-amber-600 transition mb-2">Stay Logged In</button>
      <button onclick="handleLogout()" class="w-full bg-slate-200 text-slate-900 py-3 rounded-xl font-bold hover:bg-slate-300 transition">Logout Now</button>
    </div>
  </div>

  <div class="w-full max-w-sm mx-auto">
    <div class="mb-6 flex justify-between items-end">
      <div>
        <p id="todayDate" class="text-[11px] font-bold text-slate-400 uppercase tracking-[0.2em] mb-1"></p>
        <h1 class="text-2xl font-bold text-slate-900">Hi, Bharata 👋</h1>
      </div>
      <div class="flex items-center gap-3">
        <button onclick="handleLogout()" class="text-[10px] text-slate-400 hover:text-red-500 underline">Logout</button>
      </div>
    </div>
    
    <!-- Allowance Card -->
    <div class="allowance-card p-6 rounded-3xl mb-8 shadow-lg text-white flex justify-between items-center h-28">
      <div>
        <p class="text-[10px] font-semibold uppercase tracking-widest opacity-80 mb-1">YOUR ALLOWANCE</p>
        <h2 id="sisaBudget" class="text-2xl font-black tracking-tight">*******</h2>
      </div>
      <button onclick="toggleBalance()" class="h-10 w-10 flex items-center justify-center rounded-xl bg-white/20 hover:bg-white/30 transition flex-shrink-0" title="Toggle balance visibility">
        <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
          <circle cx="12" cy="12" r="3"></circle>
        </svg>
      </button>
    </div>
    
    <form id="expenseForm" class="space-y-4 bg-white p-6 rounded-2xl shadow">
      <input type="text" id="barang" placeholder="What do you buy?" required class="w-full px-5 py-3 rounded-2xl bg-slate-50 border border-slate-200 outline-none focus:ring-2 focus:ring-indigo-500">
      <select id="kategori" class="w-full px-5 py-3 rounded-2xl bg-slate-50 border border-slate-200 outline-none text-sm text-slate-600 appearance-none">
        <option value="Food">🍔 Food & Drink</option>
        <option value="Transport">🚗 Transport</option>
        <option value="Fuel">⛽ Fuel</option>
        <option value="Bills">💡 Bills / Credit</option>
        <option value="Shopping">🛒 Monthly Shopping</option>
        <option value="Entertainment">🎮 Entertainment</option>
        <option value="Health">💊 Health</option>
        <option value="Others">📦 Others</option>
      </select>
      <input type="text" id="jumlahDisplay" placeholder="Amount (Rp)" required class="w-full px-5 py-3 rounded-2xl bg-slate-50 border border-slate-200 outline-none focus:ring-2 focus:ring-indigo-500">
      <button type="submit" id="submitBtn" class="w-full bg-slate-900 text-white font-bold py-3 rounded-2xl shadow-lg hover:bg-slate-800 transition">Save Transaction</button>
    </form>

    <!-- Recent Transactions Section -->
    <div class="mt-8">
      <h3 class="text-sm font-bold text-slate-700 mb-4 cursor-pointer flex justify-between items-center" onclick="toggleSection('expenseList')">
        <span>📋 RECENT TRANSACTIONS</span>
        <svg id="arrow-expenseList" xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 transition-transform transform" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
        </svg>
      </h3>
      <div id="expenseList" class="hidden space-y-3"></div>
    </div>
  </div>

  <script>
    // ===== SESSION & LOGIN MANAGEMENT =====
    const STORAGE_URL = 'bw_script_url';
    const STORAGE_PIN = 'bw_script_pin';
    const STORAGE_LOGIN_TIME = 'bw_login_time';
    const SESSION_DURATION = 10 * 60 * 1000;
    const WARNING_TIME = 2 * 60 * 1000;

    let sessionTimer = null;
    let warningTimer = null;
    let isLoggedIn = false;
    let balanceVisible = false;

    function getTimeRemaining() {
      const loginTime = parseInt(localStorage.getItem(STORAGE_LOGIN_TIME)) || 0;
      const now = Date.now();
      const timeRemaining = SESSION_DURATION - (now - loginTime);
      return Math.max(0, timeRemaining);
    }

    function isSessionValid() {
      const loginTime = parseInt(localStorage.getItem(STORAGE_LOGIN_TIME)) || 0;
      if (!loginTime) return false;
      const timeRemaining = getTimeRemaining();
      return timeRemaining > 0;
    }

    function updateSessionTimer() {
      const timeRemaining = getTimeRemaining();
      if (timeRemaining <= 0) {
        handleSessionTimeout();
        return;
      }
    }

    function startSessionTimer() {
      if (sessionTimer) clearInterval(sessionTimer);
      sessionTimer = setInterval(() => {
        updateSessionTimer();
      }, 1000);
      
      if (warningTimer) clearTimeout(warningTimer);
      const timeRemaining = getTimeRemaining();
      const timeUntilWarning = timeRemaining - WARNING_TIME;
      
      if (timeUntilWarning > 0) {
        warningTimer = setTimeout(() => {
          showTimeoutWarning();
        }, timeUntilWarning);
      } else if (timeRemaining > 0) {
        showTimeoutWarning();
      }
    }

    function showTimeoutWarning() {
      document.getElementById('timeoutWarningModal').classList.remove('hidden');
      let countdownValue = 120;
      const countdownEl = document.getElementById('warningCountdown');
      
      const warningInterval = setInterval(() => {
        countdownValue--;
        if (countdownValue <= 0) {
          clearInterval(warningInterval);
          handleSessionTimeout();
        } else {
          const mins = Math.floor(countdownValue / 60);
          const secs = countdownValue % 60;
          countdownEl.textContent = `${mins}:${String(secs).padStart(2, '0')}`;
        }
      }, 1000);
    }

    function extendSession() {
      localStorage.setItem(STORAGE_LOGIN_TIME, Date.now().toString());
      document.getElementById('timeoutWarningModal').classList.add('hidden');
      startSessionTimer();
    }

    function handleSessionTimeout() {
      showLoginModal('Session expired! Please login again.');
      clearAllTimers();
      handleLogout();
    }

    function clearAllTimers() {
      if (sessionTimer) clearInterval(sessionTimer);
      if (warningTimer) clearTimeout(warningTimer);
    }

    async function handleLogin() {
      const url = document.getElementById('loginUrl').value.trim();
      const pin = document.getElementById('loginPin').value.trim();
      const loginBtn = document.getElementById('loginBtn');
      const errorEl = document.getElementById('loginError');

      if (!url || !pin) {
        errorEl.textContent = 'Please enter both URL and PIN';
        errorEl.classList.remove('hidden');
        return;
      }

      loginBtn.disabled = true;
      loginBtn.textContent = 'Verifying...';
      errorEl.classList.add('hidden');

      try {
        const res = await fetch(url + "?pin=" + pin);
        if (!res.ok) {
          throw new Error('Invalid credentials or URL');
        }
        const data = await res.json();
        
        if (data.error) {
          throw new Error(data.error);
        }
        
        localStorage.setItem(STORAGE_URL, url);
        localStorage.setItem(STORAGE_PIN, pin);
        localStorage.setItem(STORAGE_LOGIN_TIME, Date.now().toString());
        
        isLoggedIn = true;
        balanceVisible = false;
        document.getElementById('loginModal').classList.add('hidden');
        startSessionTimer();
        fetchData();
      } catch (err) {
        errorEl.textContent = 'Login failed: ' + err.message;
        errorEl.classList.remove('hidden');
        console.error('Login error:', err);
      } finally {
        loginBtn.disabled = false;
        loginBtn.textContent = 'Login';
      }
    }

    function handleLogout() {
      clearAllTimers();
      localStorage.removeItem(STORAGE_LOGIN_TIME);
      isLoggedIn = false;
      balanceVisible = false;
      document.getElementById('timeoutWarningModal').classList.add('hidden');
      showLoginModal();
    }

    function showLoginModal(message = '') {
      const modal = document.getElementById('loginModal');
      const errorEl = document.getElementById('loginError');
      
      document.getElementById('loginUrl').value = '';
      document.getElementById('loginPin').value = '';
      
      if (message) {
        errorEl.textContent = message;
        errorEl.classList.remove('hidden');
      } else {
        errorEl.classList.add('hidden');
      }
      
      modal.classList.remove('hidden');
    }

    function checkLogin() {
      if (!localStorage.getItem(STORAGE_URL) || !isSessionValid()) {
        isLoggedIn = false;
        balanceVisible = false;
        showLoginModal();
      } else {
        isLoggedIn = true;
        startSessionTimer();
        fetchData();
      }
    }

    // ===== TRACKER FUNCTIONALITY =====

    function toggleSection(elementId) {
      const element = document.getElementById(elementId);
      if (!element) return;
      
      element.classList.toggle('hidden');
      
      const icon = document.getElementById('arrow-' + elementId);
      if (icon) {
        if (element.classList.contains('hidden')) {
          icon.classList.remove('rotate-180');
        } else {
          icon.classList.add('rotate-180');
        }
      }
    }

    function toggleBalance() {
      const budgetEl = document.getElementById('sisaBudget');
      const eyeIcon = document.getElementById('eyeIcon');
      
      if (balanceVisible) {
        budgetEl.innerText = '*******';
        eyeIcon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle>';
        balanceVisible = false;
      } else {
        fetchData();
        eyeIcon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24" /><line x1="1" y1="1" x2="23" y2="23" />';
        balanceVisible = true;
      }
    }

    const amountInput = document.getElementById('jumlahDisplay');
    amountInput.addEventListener('input', function(e) {
      let value = this.value.replace(/[^,\d]/g, '').toString();
      let split = value.split(',');
      let sisa = split[0].length % 3;
      let rupiah = split[0].substr(0, sisa);
      let ribuan = split[0].substr(sisa).match(/\d{3}/gi);
      if (ribuan) {
        let separator = sisa ? '.' : '';
        rupiah += separator + ribuan.join('.');
      }
      this.value = split[1] != undefined ? rupiah + ',' + split[1] : rupiah;
    });

    document.getElementById('todayDate').innerText = new Date().toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' }).toUpperCase();
    
    function formatDateFull(date) {
      return new Date(date).toLocaleDateString('id-ID', { weekday: 'short', month: 'short', day: 'numeric' });
    }

    function formatMonth(date) {
      return new Date(date).toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
    }

    function parseTransactionDate(dateStr) {
      if (!dateStr) return new Date();
      const strValue = dateStr.toString().trim();
      if (strValue.includes('/')) {
        const parts = strValue.split('/');
        if (parts.length === 3) return new Date(parts[2], parts[1] - 1, parts[0]);
      }
      if (strValue.includes('-')) {
        const parts = strValue.split('-');
        if (parts.length === 3) return new Date(parts[0], parts[1] - 1, parts[2]);
      }
      const date = new Date(dateStr);
      return !isNaN(date.getTime()) ? date : new Date();
    }

    function groupByMonthWeekAndDay(transactions) {
      const grouped = {};
      transactions.forEach(t => {
        let date = parseTransactionDate(t.date);
        const year = date.getFullYear();
        const month = date.getMonth();
        const monthKey = `${year}-${String(month + 1).padStart(2, '0')}`;
        
        if (!grouped[monthKey]) grouped[monthKey] = { monthKey, year, month, date, transactions: [], total: 0 };
        
        const amount = parseFloat(t.jumlah) || 0;
        t.processedDate = date;
        grouped[monthKey].transactions.push(t);
        grouped[monthKey].total += amount;
      });
      return grouped;
    }

    async function fetchData() {
      if (!localStorage.getItem(STORAGE_URL)) return;
      try {
        const url = localStorage.getItem(STORAGE_URL) + "?pin=" + localStorage.getItem(STORAGE_PIN);
        const res = await fetch(url);
        const data = await res.json();
        renderHistory(data.history || []);
        if (balanceVisible) document.getElementById('sisaBudget').innerText = "Rp " + (parseFloat(data.budget) || 0).toLocaleString('id-ID');
      } catch (err) { console.error('Fetch error:', err); }
    }

    document.getElementById("expenseForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      if (!isSessionValid()) { handleSessionTimeout(); return; }
      const btn = document.getElementById('submitBtn');
      btn.innerText = "Saving...";
      const formData = new URLSearchParams({
        barang: document.getElementById('barang').value,
        kategori: document.getElementById('kategori').value,
        jumlah: document.getElementById('jumlahDisplay').value.replace(/\./g, ''),
        pin: localStorage.getItem(STORAGE_PIN)
      });
      try {
        await fetch(localStorage.getItem(STORAGE_URL), { method: "POST", body: formData });
        btn.innerText = "Save Transaction";
        document.getElementById('expenseForm').reset();
        setTimeout(() => fetchData(), 500);
      } catch (err) { console.error('Submit error:', err); btn.innerText = "Error!"; }
    });

    function renderHistory(transactions) {
      const list = document.getElementById('expenseList');
      const emojiMap = { 'Food': '🍔', 'Transport': '🚗', 'Fuel': '⛽', 'Bills': '💡', 'Shopping': '🛒', 'Entertainment': '🎮', 'Health': '💊', 'Others': '📦' };
      
      if (!transactions || transactions.length === 0) {
        list.innerHTML = `<p class="text-center text-slate-400 py-6 text-xs">No transactions.</p>`;
        return;
      }

      const grouped = groupByMonthWeekAndDay(transactions);
      const sortedMonths = Object.keys(grouped).sort((a, b) => b.localeCompare(a));

      list.innerHTML = sortedMonths.map(monthKey => {
        const monthGroup = grouped[monthKey];
        const monthDomId = `month-${monthKey}`;
        
        return `
          <div class="border border-slate-200 rounded-xl overflow-hidden bg-white shadow-sm">
            <div onclick="toggleSection('${monthDomId}')" class="bg-slate-50 px-4 py-3 cursor-pointer flex justify-between items-center border-b border-slate-100">
              <span class="font-bold text-slate-700 text-xs uppercase tracking-wider">${formatMonth(monthGroup.date)}</span>
              <svg id="arrow-${monthDomId}" xmlns="http://www.w3.org/2000/svg" class="h-3 w-3 transition-transform text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
            </div>
            <div id="${monthDomId}" class="hidden p-2 text-[0.75rem]">
              ${monthGroup.transactions.sort((a,b) => b.processedDate - a.processedDate).map(t => {
                const cat = t.kategori || 'Others';
                return `
                <div class="flex justify-between items-center py-2 px-2 border-b border-dashed border-slate-100">
                  <div class="flex flex-col">
                    <span class="font-semibold text-slate-800 text-[0.8rem]">${t.barang}</span>
                    <span class="text-[0.65rem] text-slate-400">${formatDateFull(t.processedDate)} • ${emojiMap[cat] || '📦'} ${cat}</span>
                  </div>
                  <span class="font-bold text-slate-900 tracking-tight">Rp ${parseFloat(t.jumlah).toLocaleString('id-ID')}</span>
                </div>
              `}).join('')}
              <div class="px-2 pt-3 mt-1 font-bold text-slate-900 border-t border-slate-200 text-right">
                TOTAL: Rp ${monthGroup.total.toLocaleString('id-ID')}
              </div>
            </div>
          </div>
        `;
      }).join('');
    }

    checkLogin();
  </script>
</body>
</html>
